# Local MySQL for tests
spring.datasource.url=jdbc:mysql://localhost:3306/omni_payment?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Murali#13
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Disable Config Server for tests
spring.cloud.config.enabled=false
spring.cloud.config.import-check.enabled=false

# Disable Eureka for tests
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false

# App name & Random Port for testing
spring.application.name=payment-service
server.port=0